services:
  step-ca:
    image: smallstep/step-ca:latest
    container_name: step-ca
    restart: unless-stopped
    environment:
      DOCKER_STEPCA_INIT_NAME: ${STEP_CA_INIT_NAME}
      DOCKER_STEPCA_INIT_DNS_NAMES: ${STEP_CA_INIT_DNS_NAMES}
      DOCKER_STEPCA_INIT_PASSWORD: ${STEP_CA_INIT_PASSWORD}
      DOCKER_STEPCA_INIT_PROVISIONER_NAME: ${STEP_CA_PROVISIONER_NAME}
    ports:
      - "${STEP_CA_PORT:-9100}:9000"
    volumes:
      - ${PORTAINER_DATA_ROOT}/step-ca:/home/step
    networks:
      - proxy

  freeradius:
    image: freeradius/freeradius-server:3.2.10
    container_name: freeradius
    restart: unless-stopped
    depends_on:
      - step-ca
    environment:
      RADIUS_SECRET: ${RADIUS_SECRET}
      UNIFI_CONTROLLER_IP: ${UNIFI_CONTROLLER_IP}
    cap_add:
      - NET_ADMIN
    ports:
      - "${UNIFI_RADIUS_PORT:-1812}:1812/udp"
      - "${UNIFI_ACCOUNTING_PORT:-1813}:1813/udp"
    volumes:
      - ${PORTAINER_REPO_ROOT}/freeradius/docker-entrypoint.sh:/usr/local/bin/docker-entrypoint.sh:ro
      - ${PORTAINER_REPO_ROOT}/freeradius/clients.conf.template:/opt/freeradius/templates/clients.conf.template:ro
      - ${PORTAINER_REPO_ROOT}/freeradius/eap.conf.template:/opt/freeradius/templates/eap.conf.template:ro
      - ${PORTAINER_REPO_ROOT}/freeradius/default.template:/opt/freeradius/templates/default.template:ro
      - ${PORTAINER_DATA_ROOT}/freeradius/certs:/etc/raddb/certs:ro
    entrypoint: ["/bin/sh", "/usr/local/bin/docker-entrypoint.sh"]
    command: ["freeradius", "-f"]
    networks:
      - proxy

networks:
  proxy:
    external: true
